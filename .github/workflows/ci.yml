name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # Lint (runs in parallel)
  # ===========================================

  lint:
    name: Lint Client
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

  # ===========================================
  # Integration Tests (everything in Docker)
  # ===========================================

  integration:
    name: Integration Tests
    timeout-minutes: 25
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        uses: docker/bake-action@v5
        with:
          workdir: .
          files: docker-compose.yml
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Start services
        env:
          POSTGRES_DB: eduvault_test
          DB_DATABASE: eduvault_test
          NODE_ENV: test
          JWT_SECRET: test-secret-key
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: sleep 15

      - name: Run database migrations
        run: docker compose exec -T backend npx sequelize-cli db:migrate

      - name: Seed test data
        run: docker compose exec -T backend npx sequelize-cli db:seed:all

      - name: Run integration health check
        run: curl -f http://localhost:8000 || exit 1

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno API tests
        working-directory: server/bruno
        run: |
          bru run --env ci \
            --reporter-junit ../../bru-results.xml \
            --reporter-json ../../bru-results.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            bru-results.xml
            bru-results.json

      - name: Display service logs on failure
        if: failure()
        run: docker compose logs
