services:
  postgres:
    image: postgres:16
    container_name: eduvault-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edu_vault}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - eduvault-network

  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: eduvault-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - eduvault-network

  backend:
    build:
      context: ./server
    container_name: eduvault-backend
    command: node index.js
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-edu_vault}
      DB_PORT: ${DB_PORT:-5432}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml:8001}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - postgres
      - qdrant
      - ml
    restart: unless-stopped
    networks:
      - eduvault-network

  ml:
    build:
      context: ./ml
    container_name: eduvault-ml
    ports:
      - "8001:8001"
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-eduvault}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      ML_SERVICE_PORT: "8001"
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - eduvault-network

  client:
    build:
      context: ./client
    container_name: eduvault-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:8000}
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - eduvault-network

  # ==============================================================================
  # Monitoring Stack
  # ==============================================================================

  node_exporter:
    image: prom/node-exporter:v1.8.0
    container_name: eduvault-node-exporter
    command:
      - "--path.rootfs=/host"
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave
    pid: host
    restart: unless-stopped
    networks:
      - eduvault-network

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: eduvault-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - eduvault-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: eduvault-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    environment:
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_FROM: ${SMTP_FROM:-alertmanager@eduvault.local}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped
    networks:
      - eduvault-network

  grafana:
    image: grafana/grafana:11.1.0
    container_name: eduvault-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards/providers:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards/json:/var/lib/grafana/dashboards:ro
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - eduvault-network

volumes:
  postgres_data:
  qdrant_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:

# ==============================================================================
# Networks
# ==============================================================================
networks:
  eduvault-network:
    driver: bridge
