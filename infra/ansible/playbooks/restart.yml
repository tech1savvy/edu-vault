---
- name: Restart EduVault Services
  hosts: app_servers
  become: yes
  gather_facts: yes

  vars_files:
    - secrets.yml

  tasks:
    - name: Stop services
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose down
      become_user: "{{ app_user }}"
      failed_when: false

    - name: Start services
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose up -d --pull always
      become_user: "{{ app_user }}"
      async: 900
      poll: 30

    - name: Wait for services to be ready
      ansible.builtin.wait_for:
        port: "{{ item }}"
        host: "{{ ansible_host }}"
        timeout: 120
      loop:
        - 8000
        - 8001
        - 5173
        - 9090
        - 3000
        - 9100
        - 9093

    - name: Show service status
      ansible.builtin.shell: |
        cd {{ app_dir }}
        docker-compose ps
      register: status

    - name: Display status
      ansible.builtin.debug:
        var: status.stdout_lines
