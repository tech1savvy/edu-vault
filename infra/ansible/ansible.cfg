[defaults]
inventory = ./inventory/hosts.ini
roles_path = ./roles
host_key_checking = False
timeout = 60
retry_files_enabled = False
remote_user = ec2-user

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentityFile=/Users/avjotsingh/.ssh/id_rsa
